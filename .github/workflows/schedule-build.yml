name: Schedule Build
on:
  schedule:
    - cron: "0 0 1 * *"
permissions:
  contents: read
env:
  REGISTRY_IMAGE: public.ecr.aws/zuin/highcharts-export-server
jobs:
  build-prod-image:
    name: build prod image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - v5.1.0
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: type=semver,pattern={{version}},value=${{ matrix.branch }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          buildkitd-config-inline: ${{ vars.BUILDKITD_CONFIG }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          # ECR Public can only be logged into from the us-east-1 region
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE }}
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          platforms: linux/amd64
          provenance: false
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push=true
          target: prod
  vulnerability-scanning:
    name: vulnerability scanning
    runs-on: ubuntu-latest
    needs: build-prod-image
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:latest
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.32.6
        with:
          sarif_file: "trivy-results.sarif"
  generate-sbom:
    name: generate SBOM
    runs-on: ubuntu-latest
    needs: build-prod-image
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy in GitHub SBOM mode and submit results to Dependency Graph
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:latest
          format: "github"
          output: "dependency-results.sbom.json"
          github-pat: ${{ secrets.GITHUB_TOKEN }}
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
