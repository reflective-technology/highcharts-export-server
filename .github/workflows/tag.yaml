name: Auto Tagging
on:
  push:
    branches:
      - main
    paths:
      - "package.json"
jobs:
  version:
    runs-on: reflective-local-runner
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: get version
        id: info
        uses: jaywcjlove/github-action-package@6fb8b5f918c1cb2eb3e0416d5b9f45cd4af6ed16
      - name: Debug Version
        run: echo "VERSION=${{ steps.info.outputs.version }}"
  tag:
    runs-on: reflective-local-runner
    needs: version
    if: needs.version.outputs.version != '0.0.0'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        with:
          github_token: ${{ steps.generate-token.outputs.token }}
          tag_prefix: "v"
          custom_tag: ${{ needs.version.outputs.version }}
      - uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b
        with:
          generateReleaseNotes: true
          skipIfReleaseExists: true
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
