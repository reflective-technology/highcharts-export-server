version: 2
registries:
  dhi:
    type: docker-registry
    url: dhi.io
    username: ${{secrets.DOCKERHUB_USER}}
    password: ${{secrets.DOCKERHUB_PASSWORD}}
    replaces-base: false
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    directory: "/"
    registries:
      - dhi
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "node"
        versions: ["> 25.0.0-sfw-dev"]
